<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude AI</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0e1a;
      --surface: #111827;
      --surface2: #1a2235;
      --border: #1f2f4a;
      --accent: #3b82f6;
      --accent2: #60a5fa;
      --green: #10b981;
      --text: #e2e8f0;
      --muted: #64748b;
      --radius: 10px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    .header {
      padding: 14px 16px 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .logo {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700; color: #fff;
      flex-shrink: 0;
    }
    .header-text h1 { font-size: 14px; font-weight: 600; color: var(--text); line-height: 1; }
    .header-text p  { font-size: 11px; color: var(--muted); margin-top: 2px; }

    /* API Key section */
    .api-section {
      padding: 12px 16px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .api-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .api-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 10px;
      font-size: 11px;
      font-family: 'DM Mono', monospace;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }
    .api-input::placeholder { color: var(--muted); }
    .api-input:focus { border-color: var(--accent); }
    .btn-save {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 7px 12px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
    }
    .btn-save:hover { background: #2563eb; }
    .api-status {
      font-size: 10px;
      margin-top: 5px;
      height: 14px;
      transition: color 0.2s;
    }
    .api-status.ok  { color: var(--green); }
    .api-status.err { color: #f87171; }

    /* Mode tabs */
    .tabs {
      display: flex;
      padding: 10px 16px 0;
      gap: 4px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .tab {
      padding: 7px 12px;
      font-size: 11px;
      font-weight: 500;
      border-radius: 6px 6px 0 0;
      cursor: pointer;
      color: var(--muted);
      border: 1px solid transparent;
      border-bottom: none;
      transition: all 0.15s;
      background: transparent;
    }
    .tab.active {
      color: var(--accent2);
      background: var(--bg);
      border-color: var(--border);
    }
    .tab:hover:not(.active) { color: var(--text); }

    /* Chat area */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .chat-area::-webkit-scrollbar { width: 4px; }
    .chat-area::-webkit-scrollbar-track { background: transparent; }
    .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .msg {
      display: flex;
      flex-direction: column;
      gap: 4px;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    .msg-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .msg.user .msg-label { color: var(--accent2); }
    .msg.ai   .msg-label { color: var(--green); }

    .msg-bubble {
      padding: 10px 12px;
      border-radius: var(--radius);
      font-size: 12px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user .msg-bubble {
      background: var(--surface2);
      border: 1px solid var(--border);
    }
    .msg.ai .msg-bubble {
      background: #0d1f0f;
      border: 1px solid #1a3a20;
      color: #a7f3d0;
    }
    .msg.ai.error .msg-bubble {
      background: #1f0d0d;
      border-color: #3a1a1a;
      color: #fca5a5;
    }

    /* Typing indicator */
    .typing {
      display: flex; gap: 4px; align-items: center; padding: 10px 12px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius); width: fit-content;
    }
    .typing span {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--muted);
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%,60%,100% { transform: translateY(0); }
      30% { transform: translateY(-5px); background: var(--accent); }
    }

    /* Cell panel */
    .cell-panel { display: none; flex: 1; flex-direction: column; padding: 14px 16px; gap: 10px; overflow-y: auto; }
    .cell-panel.active { display: flex; }

    .cell-info {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px;
    }
    .cell-info label { font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .cell-info p { font-size: 12px; color: var(--text); margin-top: 4px; font-family: 'DM Mono', monospace; }

    .action-btn {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text);
      cursor: pointer;
      text-align: left;
      transition: all 0.15s;
      display: flex; align-items: center; gap: 8px;
    }
    .action-btn:hover { border-color: var(--accent); color: var(--accent2); background: #111e35; }
    .action-btn .icon { font-size: 14px; }

    .result-box {
      background: #0d1f0f;
      border: 1px solid #1a3a20;
      border-radius: var(--radius);
      padding: 10px 12px;
      font-size: 12px;
      color: #a7f3d0;
      white-space: pre-wrap;
      line-height: 1.6;
      display: none;
    }
    .result-box.visible { display: block; animation: fadeIn 0.2s ease; }

    .btn-insert {
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      display: none;
      transition: background 0.2s;
    }
    .btn-insert.visible { display: block; }
    .btn-insert:hover { background: #059669; }

    /* Input bar */
    .input-bar {
      padding: 12px 16px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
      align-items: flex-end;
      flex-shrink: 0;
    }
    .input-wrap { flex: 1; position: relative; }
    textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 9px 12px;
      font-size: 12px;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      resize: none;
      outline: none;
      line-height: 1.5;
      max-height: 100px;
      transition: border-color 0.2s;
    }
    textarea::placeholder { color: var(--muted); }
    textarea:focus { border-color: var(--accent); }

    .btn-send {
      width: 36px; height: 36px;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, transform 0.1s;
    }
    .btn-send:hover { background: #2563eb; }
    .btn-send:active { transform: scale(0.95); }
    .btn-send:disabled { background: var(--border); cursor: not-allowed; }
    .btn-send svg { width: 16px; height: 16px; fill: #fff; }

    .empty-state {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 8px; color: var(--muted); text-align: center;
    }
    .empty-state .big { font-size: 32px; }
    .empty-state p { font-size: 12px; line-height: 1.6; }

    /* Panel show/hide */
    .panel { display: none; flex-direction: column; flex: 1; overflow: hidden; }
    .panel.active { display: flex; }
  </style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="logo">C</div>
  <div class="header-text">
    <h1>Claude AI</h1>
    <p>Excel Add-in</p>
  </div>
</div>

<!-- API Key -->
<div class="api-section">
  <div class="api-row">
    <input class="api-input" type="password" id="apiKey" placeholder="Nhập API key: sk-ant-..." />
    <button class="btn-save" onclick="saveKey()">Lưu</button>
  </div>
  <div class="api-status" id="apiStatus"></div>
</div>

<!-- Tabs -->
<div class="tabs">
  <div class="tab active" onclick="switchTab('chat', this)">💬 Chat</div>
  <div class="tab" onclick="switchTab('cell', this)">📊 Ô tính</div>
</div>

<!-- Chat Panel -->
<div class="panel active" id="panel-chat">
  <div class="chat-area" id="chatArea">
    <div class="empty-state">
      <div class="big">🤖</div>
      <p>Hỏi Claude bất kỳ điều gì<br>về Excel, dữ liệu, công thức...</p>
    </div>
  </div>
  <div class="input-bar">
    <div class="input-wrap">
      <textarea id="chatInput" rows="1" placeholder="Nhập câu hỏi..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    </div>
    <button class="btn-send" id="sendBtn" onclick="sendChat()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<!-- Cell Panel -->
<div class="panel" id="panel-cell">
  <div class="cell-panel active">
    <div class="cell-info">
      <label>Ô đang chọn</label>
      <p id="cellAddress">—</p>
      <label style="margin-top:8px;display:block">Nội dung</label>
      <p id="cellValue" style="color:var(--muted)">Chưa chọn ô</p>
    </div>

    <button class="action-btn" onclick="analyzeCell()">
      <span class="icon">🔍</span> Phân tích / giải thích ô này
    </button>
    <button class="action-btn" onclick="suggestFormula()">
      <span class="icon">⚡</span> Gợi ý công thức cho ô này
    </button>
    <button class="action-btn" onclick="translateCell()">
      <span class="icon">🌐</span> Dịch nội dung sang tiếng Việt
    </button>
    <button class="action-btn" onclick="fixFormula()">
      <span class="icon">🔧</span> Sửa lỗi công thức
    </button>

    <div class="result-box" id="cellResult"></div>
    <button class="btn-insert" id="btnInsert" onclick="insertToCell()">
      ✅ Ghi vào ô kế bên
    </button>
  </div>
</div>

<script>
  let apiKey = '';
  let lastCellResult = '';

  Office.onReady(() => {
    // Load saved key
    const saved = localStorage.getItem('claude_api_key');
    if (saved) {
      apiKey = saved;
      document.getElementById('apiKey').value = saved;
      setStatus('✅ API key đã lưu', 'ok');
    }
    // Start polling selected cell
    setInterval(updateCellInfo, 1500);
  });

  function saveKey() {
    const val = document.getElementById('apiKey').value.trim();
    if (!val.startsWith('sk-ant-')) {
      setStatus('❌ Key không hợp lệ (phải bắt đầu bằng sk-ant-)', 'err');
      return;
    }
    apiKey = val;
    localStorage.setItem('claude_api_key', val);
    setStatus('✅ Đã lưu API key!', 'ok');
  }

  function setStatus(msg, type) {
    const el = document.getElementById('apiStatus');
    el.textContent = msg;
    el.className = 'api-status ' + type;
  }

  function switchTab(tab, el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('panel-' + tab).classList.add('active');
    if (tab === 'cell') updateCellInfo();
  }

  async function updateCellInfo() {
    if (!document.getElementById('panel-cell').classList.contains('active')) return;
    try {
      await Excel.run(async ctx => {
        const cell = ctx.workbook.getSelectedRange();
        cell.load(['address', 'values', 'formulas']);
        await ctx.sync();
        const addr = cell.address.split('!').pop();
        const val  = cell.values[0][0];
        const form = cell.formulas[0][0];
        document.getElementById('cellAddress').textContent = addr;
        document.getElementById('cellValue').textContent =
          form && form !== val ? form + ' → ' + val : (val ?? '(trống)');
        document.getElementById('cellValue').style.color = 'var(--text)';
      });
    } catch(e) {}
  }

  async function callClaude(prompt) {
    if (!apiKey) {
      alert('Vui lòng nhập và lưu API key trước!');
      return null;
    }
    const r = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    if (!r.ok) {
      const e = await r.json();
      throw new Error(e.error?.message || r.statusText);
    }
    const d = await r.json();
    return d.content[0].text;
  }

  // ---- CHAT ----
  function addMsg(role, text, isError=false) {
    const area = document.getElementById('chatArea');
    const empty = area.querySelector('.empty-state');
    if (empty) empty.remove();

    const div = document.createElement('div');
    div.className = 'msg ' + role + (isError ? ' error' : '');
    div.innerHTML = `
      <div class="msg-label">${role === 'user' ? 'Bạn' : 'Claude'}</div>
      <div class="msg-bubble">${text}</div>`;
    area.appendChild(div);
    area.scrollTop = area.scrollHeight;
    return div;
  }

  function addTyping() {
    const area = document.getElementById('chatArea');
    const div = document.createElement('div');
    div.className = 'msg ai';
    div.innerHTML = `
      <div class="msg-label">Claude</div>
      <div class="typing"><span></span><span></span><span></span></div>`;
    area.appendChild(div);
    area.scrollTop = area.scrollHeight;
    return div;
  }

  async function sendChat() {
    const input = document.getElementById('chatInput');
    const text  = input.value.trim();
    if (!text || !apiKey) {
      if (!apiKey) alert('Vui lòng lưu API key trước!');
      return;
    }
    input.value = '';
    autoResize(input);
    document.getElementById('sendBtn').disabled = true;

    addMsg('user', text);
    const typing = addTyping();

    try {
      const reply = await callClaude(
        'Bạn là trợ lý Excel thông minh. Trả lời bằng tiếng Việt, ngắn gọn, thực tế.\n\n' + text
      );
      typing.remove();
      addMsg('ai', reply);
    } catch(e) {
      typing.remove();
      addMsg('ai', '❌ Lỗi: ' + e.message, true);
    }
    document.getElementById('sendBtn').disabled = false;
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
  }
  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px';
  }

  // ---- CELL ACTIONS ----
  async function runCellAction(promptFn) {
    try {
      let content = '';
      await Excel.run(async ctx => {
        const cell = ctx.workbook.getSelectedRange();
        cell.load(['address', 'values', 'formulas']);
        await ctx.sync();
        content = cell.formulas[0][0] || cell.values[0][0] || '';
      });
      if (!content) { alert('Ô đang trống!'); return; }

      const box = document.getElementById('cellResult');
      const btn = document.getElementById('btnInsert');
      box.textContent = '⏳ Đang hỏi Claude...';
      box.className = 'result-box visible';
      btn.className = 'btn-insert';

      const reply = await callClaude(promptFn(String(content)));
      lastCellResult = reply;
      box.textContent = reply;
      btn.className = 'btn-insert visible';
    } catch(e) {
      document.getElementById('cellResult').textContent = '❌ ' + e.message;
    }
  }

  function analyzeCell()    { runCellAction(c => `Giải thích nội dung/công thức Excel này bằng tiếng Việt, dễ hiểu: ${c}`); }
  function suggestFormula() { runCellAction(c => `Dựa vào ngữ cảnh "${c}", gợi ý công thức Excel phù hợp và giải thích cách dùng bằng tiếng Việt.`); }
  function translateCell()  { runCellAction(c => `Dịch nội dung sau sang tiếng Việt tự nhiên: ${c}`); }
  function fixFormula()     { runCellAction(c => `Công thức Excel này có lỗi không? Nếu có hãy sửa và giải thích: ${c}`); }

  async function insertToCell() {
    if (!lastCellResult) return;
    try {
      await Excel.run(async ctx => {
        const cell = ctx.workbook.getSelectedRange();
        cell.load('address');
        await ctx.sync();
        const row = cell.getOffsetRange(0, 1);
        row.values = [[lastCellResult]];
        await ctx.sync();
        alert('✅ Đã ghi vào ô kế bên!');
      });
    } catch(e) { alert('Lỗi: ' + e.message); }
  }
</script>
</body>
</html>
